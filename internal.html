<!DOCTYPE html>
<html>
<head>
  <title>Internal CSS</title>

  <style>
    h1 { color: red; }              /* 1 */
    p { color: blue; }             /* 2 */
    .kotak { background: yellow;}  /* 3 */
    #judul { font-size: 30px; }    /* 4 */
    ul li { color: green; }        /* 5 */
    a:hover { color: orange; }     /* 6 */
    input[type="text"] { border: 2px solid black; } /* 7 */
    div p { color: purple; }       /* 8 */
    * { font-family: Arial; }      /* 9 */
    h2, h3 { color: pink; }        /* 10 */
  </style>

</head>
<body>

<h1 id="judul">Judul</h1>
<p>Paragraf</p>

<div class="kotak">
  <p>Paragraf dalam div</p>
</div>

<ul>
  <li>Item 1</li>
</ul>

<a href="#">Link</a>
<input type="text">

<h2>Subjudul</h2>
<h3>Subjudul kecil</h3>

<a href="inline.html">Pergi ke CSS Inline</a>

</body>
</html>
